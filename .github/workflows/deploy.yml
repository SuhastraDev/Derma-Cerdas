name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy DermaCerdas
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/dermacerdas_deploy
          chmod 600 ~/.ssh/dermacerdas_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/dermacerdas_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -euo pipefail

            cd /var/www/derma-cerdas

            git fetch origin main
            git pull --ff-only origin main

            composer install --no-dev --optimize-autoloader --no-interaction
            npm ci
            npm run build

            php artisan migrate --force
            php artisan storage:link --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R ubuntu:www-data /var/www/derma-cerdas
            sudo chmod -R 775 storage bootstrap/cache
            sudo chmod -R 775 datasets || true

            sudo systemctl restart php8.4-fpm
            sudo systemctl restart dermacerdas-ai
            sudo systemctl restart dermacerdas-worker
            sudo systemctl reload nginx

            for attempt in {1..20}; do
              if curl -fsS http://127.0.0.1:8001/health; then
                break
              fi

              if [ "$attempt" -eq 20 ]; then
                sudo systemctl status dermacerdas-ai --no-pager
                sudo journalctl -u dermacerdas-ai -n 80 --no-pager
                exit 1
              fi

              sleep 2
            done

            curl -fsSI http://127.0.0.1
          EOF
